<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        (function() {
            var language = navigator.language || navigator.userLanguage;
            var lang = language.toLowerCase().startsWith('zh') ? 'zh' : 'en';
            window.location.replace("/help?lang=" + lang);
        })();
    </script>
</head>
<body>
    <p>Redirecting to <a href="/help">Help Center</a>...</p>
</body>
</html>
